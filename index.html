<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Performance Diagnostic Tool</title>
</head>
<body>
    <h1>Welcome to the AI Performance Diagnostic Tool!</h1>
    <form action="/analyze" method="post">
        <label for="url">Enter Website URL:</label>
        <input type="text" id="url" name="url" placeholder="https://example.com" required>
        <button type="submit">Analyze</button>
    </form>

    <h2>Generate Sine Wave</h2>
    <form action="/generate_sine_wave" method="post">
        <label for="amplitude">Amplitude:</label>
        <input type="number" id="amplitude" name="amplitude" value="1" required>
        <label for="frequency">Frequency:</label>
        <input type="number" id="frequency" name="frequency" value="1" required>
        <button type="submit">Generate</button>
    </form>

    <h2>Plot Custom Function</h2>
    <form action="/plot_function" method="post">
        <label for="function">Function (e.g., sin(x), x**2):</label>
        <input type="text" id="function" name="function" placeholder="sin(x)" required>
        <button type="submit">Plot</button>
    </form>

    <h2>Generate PDF Report</h2>
    <form action="/generate_pdf" method="post">
        <label for="content">Enter Text for PDF:</label>
        <textarea id="content" name="content" rows="4" cols="50" placeholder="Enter your content here..." required></textarea>
        <button type="submit">Generate PDF</button>
    </form>

    <h2>Download Sample PDF</h2>
    <form action="/sample_pdf" method="get">
        <button type="submit">Download Sample PDF</button>
    </form>
</body>
</html>
