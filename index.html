<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask アプリケーション</title>
</head>
<body>
    <h1>Flask アプリケーション</h1>

    <!-- プロット生成フォーム -->
    <h2>プロット生成</h2>
    <form action="/generate-plot" method="post">
        <button type="submit">プロットを生成</button>
    </form>

    <!-- PDF生成フォーム -->
    <h2>PDF生成</h2>
    <form action="/generate-pdf" method="post">
        <button type="submit">PDFを生成</button>
    </form>

    <!-- スクレイピングフォーム -->
    <h2>ウェブページのタイトルを取得</h2>
    <form action="/scrape" method="post">
        <label for="url">URLを入力してください:</label>
        <input type="text" id="url" name="url" placeholder="https://example.com" required>
        <button type="submit">タイトルを取得</button>
    </form>
</body>
</html>
